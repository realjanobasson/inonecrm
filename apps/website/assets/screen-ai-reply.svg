    </g>
    
    
    <rect x="490" y="294" width="590" height="150" rx="18" fill="#fbfdfd" stroke="#edf2f5"/>
    <text x="514" y="332" font-family="Inter, system-ui" font-size="12" font-weight="850" fill="#3a454d">Summary</text>
    <rect x="514" y="344" width="440" height="12" rx="6" fill="#edf2f5"/>
    <rect x="514" y="364" width="520" height="12" rx="6" fill="#edf2f5"/>
